image: $ARTIFACTORY_DOMAIN/docker:18-git

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  VIRTUALENV_NAME: "venv"
  MODULE_FOLDER: "./src"
  DOCKER_TLS_CERTDIR: ""
  SPRING_PROFILES_ACTIVE: gitlab-ci
  SERVICE: hdp-connector
  VERSION: 1.4.0

cache:
  paths:
    - cache/pip
    - $VIRTUALENV_NAME/

stages:
  - dt
  - base
  - test
  - pages
  - deploy

default:
  tags:
    - docker

base:
  image: python:3.8
  stage: base

  script:
    - pip install virtualenv  # install virtualenv to create a virtual environment to install required packages
    - virtualenv $VIRTUALENV_NAME  # create a virtualenvironment
    - source $VIRTUALENV_NAME/bin/activate  # activate the virtualenvironment
    - pip install -r requirements.txt  #--extra-index-url $ARTIFACTORY_PYPI_INDEX_URL # install required packages look also in artifactory
    - python -V  # print python version for debugging

  artifacts:
    paths:
      - $VIRTUALENV_NAME/
  only:
    refs:
      - tags
      - master
      - main

pylint:
  image: python:3.8
  stage: test

  script:
    - mkdir pylint
    - source $VIRTUALENV_NAME/bin/activate
    # - pip install pylint pylint-exit anybadge --extra-index-url $ACR_PYPI_INDEX_URL
    - pip install pylint pylint-exit anybadge
    - pylint -d C0301 -d R0913 --output-format=text $MODULE_FOLDER | tee pylint/pylint.log || pylint-exit $?
    - PYLINT_SCORE=$(sed -n 's/^Your code has been rated at \([-0-9.]*\)\/.*/\1/p' ./pylint/pylint.log)
    - anybadge --label=Pylint --file=pylint/pylint.svg --value=$PYLINT_SCORE 2=red 4=orange 8=yellow 10=green
    - echo "Pylint score is $PYLINT_SCORE"

  artifacts:
    paths:
      - pylint/
  only:
    refs:
      - tags
      - master
      - main

unit_test:
  image: python:3.8
  stage: test

  script:
    # run test files in tests folder
    - source $VIRTUALENV_NAME/bin/activate
    - python -m unittest discover tests

  only:
    refs:
      - tags
      - master
      - main

pages:
  image: python:3.8
  stage: pages

  script:
    - source $VIRTUALENV_NAME/bin/activate
    - pip install -U sphinx
    - pip install -U sphinx_glpi_theme
    - mkdir -p docs/
    - cd docs
    - sphinx-build -b html . ../public

  allow_failure: true

  artifacts:
    paths:
      - public
  only:
    refs:
      - tags

deploy:

  stage: deploy
  image: docker:18-dind

  script:
    - docker login -u $ARTIFACTORY_USER -p $ARTIFACTORY_TOKEN $ARTIFACTORY_DOMAIN
    - docker image build -t $ARTIFACTORY_DOMAIN/$CONTAINER_IMAGE . #--build-arg PIP_EXTRA_INDEX_URL=$ARTIFACTORY_PYPI_INDEX_URL ./
    # - docker tag $CONTAINER_IMAGE $ACR_URL/$CONTAINER_IMAGE:latest
    - docker push $ARTIFACTORY_DOMAIN/$CONTAINER_IMAGE
  only:
    refs:
      - tags

deploy-test:
  stage: dt
  before_script:
    - docker login -u $ARTIFACTORY_USER -p $ARTIFACTORY_TOKEN $ARTIFACTORY_DOMAIN
  image: $ARTIFACTORY_DOMAIN/$CONTAINER_IMAGE:latest
  script:
    - echo foo
  only:
    refs:
      - tags
